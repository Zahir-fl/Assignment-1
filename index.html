<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConf 2026 Landing Page</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <nav>
      <!--Left side logo-->

      <div>
        <img
          src="./B14-A01-DevConf-2026/assets/logo.png"
          alt="DevConf Logo"
          width="auto"
          height="auto"
        />
      </div>
      <!--Middle navigation menu-->

      <div>
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#schedule">Schedule</a></li>
          <li><a href="#tracks">Tracks</a></li>
          <li><a href="#venue">Venue</a></li>
          <li><a href="#blog">Blog</a></li>
        </ul>
      </div>
      <!--Right side register button-->

      <div>
        <button class="register-button">Register Now</button>
      </div>
    </nav>
    <!-- this is the Hero Section -->

    <section class="hero">
      <img
        src="./B14-A01-DevConf-2026/assets/banner.jpg"
        alt="DevConf Hero Image"
        width="auto"
        height="auto"
      />
      <div>
        <h1>Code. Connect. Create</h1>
        <p>
          Join 4,000+ engineers, founders and builders at the premier developer
        </p>
        <p>
          conference of 2026. Three days of cutting-edge talks, hands-on
          workshops,
        </p>
        <p>and meaningful connections.</p>
      </div>

      <div>
        <button class="register-button">Register Now</button>
      </div>
    </section>
  </body>
</html>
